<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Notepad Capture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      width: 280px;
      padding: 12px;
      background: #fff;
      color: #1a1a1a;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e0e0e0;
    }

    .tab-info {
      font-size: 11px;
      color: #777;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .options {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    label input[type="checkbox"] {
      cursor: pointer;
    }

    .mode-row {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }

    .mode-row label {
      flex: 1;
      justify-content: center;
      padding: 5px;
      border: 1px solid #d0d0d0;
      border-radius: 3px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 11px;
      transition: background 0.1s, border-color 0.1s;
    }

    .mode-row input[type="radio"] {
      display: none;
    }

    .mode-row input[type="radio"]:checked + span {
      font-weight: 600;
      color: #000;
    }

    .mode-row label:has(input:checked) {
      background: #e8e8e8;
      border-color: #999;
    }

    .buttons {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    button {
      flex: 1;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #c0c0c0;
      border-radius: 3px;
      background: #f0f0f0;
      cursor: pointer;
      transition: background 0.1s;
    }

    button:hover { background: #e0e0e0; }

    button.primary {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    button.primary:hover { background: #333; }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #status {
      font-size: 11px;
      min-height: 16px;
      color: #555;
    }

    #status.success { color: #2a7a2a; font-weight: 500; }
    #status.error   { color: #b00; font-weight: 500; }
  </style>
</head>
<body>
  <h1>Notepad Capture</h1>

  <div class="tab-info" id="tabInfo">Loading…</div>

  <div class="options">
    <label>
      <input type="checkbox" id="addFrontmatter" checked>
      <span>Add frontmatter (title, source, date)</span>
    </label>
  </div>

  <div class="mode-row">
    <label>
      <input type="radio" name="insertMode" value="append" checked>
      <span>Append</span>
    </label>
    <label>
      <input type="radio" name="insertMode" value="prepend">
      <span>Prepend</span>
    </label>
    <label>
      <input type="radio" name="insertMode" value="replace">
      <span>Replace</span>
    </label>
  </div>

  <div class="buttons">
    <button id="btnSelection">Capture Selection</button>
    <button id="btnPage" class="primary">Capture Page</button>
  </div>

  <div id="status">Ready.</div>

  <script src="htmlToMarkdown.js"></script>
  <script src="popup.js"></script>
</body>
</html>
